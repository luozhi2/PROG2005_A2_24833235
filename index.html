<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Inventory Management System</h1>
            <p>Harvey Norman Style Inventory Database</p>
        </header>

        <!-- 添加/编辑表单区 -->
        <div class="form-section">
            <h2>Add / Edit Item</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Item Name:</label>
                    <input type="text" id="itemName" placeholder="e.g., Gaming Laptop">
                </div>
                <div class="form-group">
                    <label>Category:</label>
                    <select id="category">
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Tools">Tools</option>
                        <option value="Miscellaneous">Miscellaneous</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity:</label>
                    <input type="number" id="quantity" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Price ($):</label>
                    <input type="number" id="price" min="0" step="0.01" value="0">
                </div>
                <div class="form-group">
                    <label>Supplier Name:</label>
                    <input type="text" id="supplierName" placeholder="e.g., TechDistro Inc.">
                </div>
                <div class="form-group">
                    <label>Stock Status:</label>
                    <select id="stockStatus">
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Popular Item:</label>
                    <select id="popularItem">
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Comment (optional):</label>
                    <input type="text" id="comment" placeholder="Any notes...">
                </div>
            </div>
            <div class="button-group">
                <button id="addBtn" class="btn btn-primary">➕ Add New Item</button>
                <button id="updateBtn" class="btn btn-warning">✏️ Update by Name</button>
            </div>
        </div>

        <!-- 操作区 -->
        <div class="action-section">
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Search by item name...">
                <button id="searchBtn" class="btn btn-secondary">🔍 Search</button>
                <button id="showAllBtn" class="btn btn-info">📋 Show All Items</button>
                <button id="showPopularBtn" class="btn btn-success">⭐ Show Popular Items</button>
            </div>
            <div class="delete-area">
                <input type="text" id="deleteInput" placeholder="Item name to delete">
                <button id="deleteBtn" class="btn btn-danger">🗑️ Delete Item</button>
            </div>
        </div>

        <!-- 输出显示区 -->
        <div class="output-section">
            <h3>Inventory Records</h3>
            <div id="output" class="output-container">
                <!-- 所有动态内容通过 innerHTML 显示在这里 -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
